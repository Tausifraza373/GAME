<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coin Toss Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Coin Toss</h1>
    <div class="coin" id="coin" title="Click to toss the coin">
      <div class="side heads">🥇</div>
      <div class="side tails">🎯</div>
    </div>
    <p id="result"></p>

    <!-- Button Group for Toss and RPS buttons -->
    <div class="button-group">
      <button id="toss-btn">Toss Coin</button>
      <button id="go-to-rps">Rock Paper Scissors</button>
    </div>
  </div>

  <!-- Creator Card -->
  <div class="creator-card">
    <img src="images/image.png" alt="Creator Photo" />
    <div class="creator-info">
      <h2>Tausif Raza</h2>
      <h4>Game Developer</h4>
      <p>Passionate about crafting fun and interactive web games with clean, modern design.</p>
    </div>
  </div>

  


  <script src="script.js"></script>
</body>
</html>
